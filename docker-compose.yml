version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: 0xmintyn-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: 0xmintyn
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - 0xmintyn-network

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: 0xmintyn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redispassword
    volumes:
      - redis_data:/data
    networks:
      - 0xmintyn-network

  # Backend API
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: 0xmintyn-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development
      PORT: 8000
      MONGODB_URL: mongodb://admin:password@mongodb:27017/0xmintyn?authSource=admin
      REDIS_URL: redis://:redispassword@redis:6379
      JWT_SECRET: your-jwt-secret-change-this
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./Backend:/app
      - /app/node_modules
    networks:
      - 0xmintyn-network
    command: npm run dev

  # Frontend Application
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: 0xmintyn-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SOLANA_NETWORK: devnet
      NEXT_PUBLIC_SOLANA_RPC_URL: https://api.devnet.solana.com
      NEXTAUTH_SECRET: your-nextauth-secret-change-this
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./Frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - 0xmintyn-network
    command: npm run dev

  # Solana Local Validator (for development)
  solana-validator:
    image: solanalabs/solana:v1.18.15
    container_name: 0xmintyn-solana-validator
    restart: unless-stopped
    ports:
      - "8899:8899"
      - "8900:8900"
      - "9900:9900"
    volumes:
      - solana_data:/opt/solana/config
    networks:
      - 0xmintyn-network
    command: >
      sh -c "
        solana-keygen new --no-bip39-passphrase --silent &&
        solana config set --url http://localhost:8899 &&
        solana-test-validator --ledger /opt/solana/config/test-ledger --bind-address 0.0.0.0 --rpc-port 8899 --rpc-bind-address 0.0.0.0
      "

  # Nginx Reverse Proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: 0xmintyn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - 0xmintyn-network
    profiles:
      - production

  # PostgreSQL (Alternative to MongoDB for analytics)
  postgres:
    image: postgres:15
    container_name: 0xmintyn-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: 0xmintyn_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - 0xmintyn-network
    profiles:
      - analytics

  # Grafana for monitoring
  grafana:
    image: grafana/grafana:latest
    container_name: 0xmintyn-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - 0xmintyn-network
    profiles:
      - monitoring

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: 0xmintyn-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - 0xmintyn-network
    profiles:
      - monitoring

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  solana_data:
    driver: local
  postgres_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  0xmintyn-network:
    driver: bridge
