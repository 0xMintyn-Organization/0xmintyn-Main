version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: equalmint-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./Backend/uploads:/app/uploads
      - ./Backend/mails:/app/mails
    networks:
      - equalmint-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: equalmint-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - equalmint-network

networks:
  equalmint-network:
    driver: bridge
