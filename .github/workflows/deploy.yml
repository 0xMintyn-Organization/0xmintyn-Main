name: Smart Deploy

on:
  push:
    branches: [ master, mukhtiar, dev ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - mukhtiar
          - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "needs_install_backend=true" >> $GITHUB_OUTPUT
            echo "needs_install_frontend=true" >> $GITHUB_OUTPUT
          else
            # Handle first commit (no HEAD~1)
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              BACKEND_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "^Backend/" | wc -l)
              FRONTEND_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "^Frontend/" | wc -l)
              BACKEND_PKG_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "Backend/(package\.json|package-lock\.json)" | wc -l)
              FRONTEND_PKG_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "Frontend/(package\.json|package-lock\.json)" | wc -l)
              ROOT_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "^(ecosystem\.config\.js|scripts/)" | wc -l)
            else
              # First commit - deploy everything
              BACKEND_CHANGED=1
              FRONTEND_CHANGED=1
              BACKEND_PKG_CHANGED=1
              FRONTEND_PKG_CHANGED=1
              ROOT_CHANGED=0
            fi
            
            [ "$BACKEND_CHANGED" -gt 0 ] || [ "$ROOT_CHANGED" -gt 0 ] && echo "backend=true" >> $GITHUB_OUTPUT || true
            [ "$FRONTEND_CHANGED" -gt 0 ] || [ "$ROOT_CHANGED" -gt 0 ] && echo "frontend=true" >> $GITHUB_OUTPUT || true
            [ "$BACKEND_PKG_CHANGED" -gt 0 ] && echo "needs_install_backend=true" >> $GITHUB_OUTPUT || true
            [ "$FRONTEND_PKG_CHANGED" -gt 0 ] && echo "needs_install_frontend=true" >> $GITHUB_OUTPUT || true
          fi
          
          echo ""
          echo "📋 Change Detection Summary:"
          echo "  Backend changed: $([ -n "${{ steps.changes.outputs.backend }}" ] && echo "yes" || echo "no")"
          echo "  Frontend changed: $([ -n "${{ steps.changes.outputs.frontend }}" ] && echo "yes" || echo "no")"
          echo "  Install Backend: $([ -n "${{ steps.changes.outputs.needs_install_backend }}" ] && echo "yes" || echo "no")"
          echo "  Install Frontend: $([ -n "${{ steps.changes.outputs.needs_install_frontend }}" ] && echo "yes" || echo "no")"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            
            PROJECT_DIR="/var/www/0xmintyn-Main"
            BRANCH="${{ github.ref_name }}"
            NODE_PATH="/root/.nvm/versions/node/v24.12.0/bin"
            PM2_CMD="$NODE_PATH/pm2"
            
            echo "🚀 Smart Deployment - Branch: $BRANCH"
            cd $PROJECT_DIR
            git config --global --add safe.directory $PROJECT_DIR || true
            
            # Pull latest code
            echo "⬇️  Pulling latest code..."
            git fetch origin
            git checkout $BRANCH 2>/dev/null || git checkout -b $BRANCH origin/$BRANCH
            git pull origin $BRANCH || echo "⚠️  Pull had conflicts, continuing..."
            
            # Get change flags
            BACKEND_UPDATE="${{ steps.changes.outputs.backend }}"
            FRONTEND_UPDATE="${{ steps.changes.outputs.frontend }}"
            INSTALL_BACKEND="${{ steps.changes.outputs.needs_install_backend }}"
            INSTALL_FRONTEND="${{ steps.changes.outputs.needs_install_frontend }}"
            
            # Check if ecosystem.config.js changed (handle first commit)
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              ECOSYSTEM_CHANGED=$(git diff HEAD~1 HEAD --name-only 2>/dev/null | grep -q "ecosystem.config.js" && echo "true" || echo "false")
            else
              ECOSYSTEM_CHANGED="false"
            fi
            
            # Backend deployment
            if [ "$BACKEND_UPDATE" = "true" ] || [ "$ECOSYSTEM_CHANGED" = "true" ]; then
              echo "🔧 Updating Backend..."
              cd $PROJECT_DIR/Backend
              
              if [ "$INSTALL_BACKEND" = "true" ]; then
                echo "📥 Installing Backend dependencies..."
                $NODE_PATH/npm install --production=false --prefer-offline --no-audit --silent
              fi
              
              echo "🔄 Restarting Backend..."
              if $PM2_CMD list | grep -q "backend.*online"; then
                $PM2_CMD restart backend
              else
                echo "Backend not running, starting from ecosystem.config.js..."
                cd $PROJECT_DIR
                $PM2_CMD start ecosystem.config.js --only backend
              fi
            else
              echo "⏭️  Backend unchanged, skipping"
            fi
            
            # Frontend deployment
            if [ "$FRONTEND_UPDATE" = "true" ] || [ "$ECOSYSTEM_CHANGED" = "true" ]; then
              echo "🎨 Updating Frontend..."
              cd $PROJECT_DIR/Frontend
              
              if [ "$INSTALL_FRONTEND" = "true" ]; then
                echo "📥 Installing Frontend dependencies..."
                $NODE_PATH/npm install --production=false --prefer-offline --no-audit --silent
              fi
              
              echo "🔄 Restarting Frontend..."
              if $PM2_CMD list | grep -q "frontend.*online"; then
                $PM2_CMD restart frontend
              else
                echo "Frontend not running, starting from ecosystem.config.js..."
                cd $PROJECT_DIR
                $PM2_CMD start ecosystem.config.js --only frontend
              fi
            else
              echo "⏭️  Frontend unchanged, skipping"
            fi
            
            # Reload ecosystem.config.js if changed
            if [ "$ECOSYSTEM_CHANGED" = "true" ]; then
              echo "⚙️  ecosystem.config.js changed, reloading PM2..."
              $PM2_CMD delete all 2>/dev/null || true
              sleep 2
              cd $PROJECT_DIR
              $PM2_CMD start ecosystem.config.js
            fi
            
            # Save PM2 state
            $PM2_CMD save || true
            
            # Wait for services to stabilize
            sleep 3
            
            # Status check with health verification
            echo ""
            echo "📊 Final Status:"
            $PM2_CMD list
            
            # Verify services are online
            BACKEND_STATUS=$($PM2_CMD list | grep "backend" | grep -q "online" && echo "✅" || echo "❌")
            FRONTEND_STATUS=$($PM2_CMD list | grep "frontend" | grep -q "online" && echo "✅" || echo "❌")
            
            echo ""
            echo "Health Check:"
            echo "  Backend: $BACKEND_STATUS"
            echo "  Frontend: $FRONTEND_STATUS"
            
            if [ "$BACKEND_STATUS" = "❌" ] || [ "$FRONTEND_STATUS" = "❌" ]; then
              echo ""
              echo "⚠️  Some services failed to start. Check logs:"
              [ "$BACKEND_STATUS" = "❌" ] && $PM2_CMD logs backend --lines 10 --nostream || true
              [ "$FRONTEND_STATUS" = "❌" ] && $PM2_CMD logs frontend --lines 10 --nostream || true
              exit 1
            fi
            
            echo ""
            echo "✅ Deployment complete and verified!"
