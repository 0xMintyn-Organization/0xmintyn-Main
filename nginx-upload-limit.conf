# Include this in your Nginx server or http block so uploads up to 50MB work.
# Without this, Nginx returns 413 Content Too Large (default is often 1MB).
# Usage: include this file inside the server { } block for api.equalmint.com
#
#   server {
#     listen 443 ssl;
#     server_name api.equalmint.com;
#     include /path/to/nginx-upload-limit.conf;
#     location / {
#       proxy_pass http://localhost:8000;
#       ...
#     }
#   }

client_max_body_size 51M;
